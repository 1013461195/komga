application.version: TESTING

komga:
  database:
    type: postgresql
    file: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:komga_test}
    username: ${POSTGRES_USERNAME:komga}
    password: ${POSTGRES_PASSWORD:komga}
    max-pool-size: 5
  tasks-db:
    type: postgresql
    file: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:komga_test}
    username: ${POSTGRES_USERNAME:komga}
    password: ${POSTGRES_PASSWORD:komga}
    max-pool-size: 5

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql

logging:
  level:
    org.gotson.komga: DEBUG
